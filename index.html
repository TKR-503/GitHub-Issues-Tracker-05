<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwind and daisyui cdn links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">


    <!-- title and favicon -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- link stylesheet -->
    <link rel="stylesheet" href="styles.css">

</head>




<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

    <div class="bg-white w-full max-w-md shadow-lg rounded-2xl p-6 sm:p-8">

        <div class="text-center ">
            <img class="mx-auto mb-5 mt-2 w-16 sm:w-20" src="./assets/github-logo.png" alt="GitHub Logo">

            <h2 class="text-xl sm:text-2xl font-bold">GitHub Issues Tracker</h2>

            <p class="text-gray-600 text-sm sm:text-base mb-6">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-5">

            <!-- username -->
            <div>
                <label class="text-gray-700 font-semibold text-sm sm:text-base">User Name</label>
                <input type="text" id="user" placeholder="Enter Username"
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm sm:text-base" />
                <p class="font-medium text-xs sm:text-sm text-violet-700 mt-1">Default: admin</p>
            </div>

            <!-- password -->
            <div>
                <label class="text-gray-700 font-semibold text-sm sm:text-base">Password</label>
                <input type="password" id="password" placeholder="Enter Password"
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm sm:text-base" />
                <p class="font-medium text-xs sm:text-sm text-violet-700 mt-1">Default: admin123</p>
            </div>

            <!-- options -->

            <div class="flex sm:items-center justify-between text-sm">
                <label class="font-medium flex items-center space-x-2">
                    <input type="checkbox" class="rounded" />
                    <span>Remember me</span>
                </label>
                <a href="#" class="text-blue-500 hover:underline font-medium">Forgot password?</a>
            </div>

            <!-- submit button -->

            <div class="mb-4">
                <button type="submit"
                    class=" w-full bg-blue-800 hover:bg-blue-600 transition text-white py-3 rounded-lg text-sm sm:text-base">
                    Sign In
                </button>
            </div>
        </form>

        <p id="message" class="text-center text-sm mt-2"></p>
    </div>
    <script src="./app_function.js/machine.js"></script>

</body>

</html>
