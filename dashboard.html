<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- tailwind and daisyui cdn links -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome cdn link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- font integration -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">


  <!-- title and favicon -->
  <title>GitHub Dashboard</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- link stylesheet -->
  <link rel="stylesheet" href="styles.css">


</head>

<body class="bg-gray-100">

  <!-- navbar -->
  <div class="navbar bg-base-100 shadow-sm px-4">

    <!-- Left section -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:gap-3 w-full sm:w-auto">

      <div class="flex items-center gap-3">
        <img class="w-10 h-10" src="./assets/github-logo.png" alt="GitHub Logo">
        <h1 class="font-bold text-xl sm:text-2xl">GitHub Issues Tracker</h1>
      </div>

    </div>

    <!-- Right section -->
    <div class="w-full sm:w-auto mt-3 sm:mt-0 sm:ml-auto">
      <input type="text" placeholder="Search issues..."
        class="focus:ring-2 focus:ring-blue-400 outline-none input input-bordered w-full sm:w-64 md:w-80" />
      <button onclick="searchIssues()"
        class="bg-indigo-600 text-white px-4 py-2 font-semibold rounded w-full sm:w-auto mt-2">+ New Search</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="w-full max-w-4xl mx-auto border border-gray-400 rounded-md p-1 bg-white mt-10 ">

    <div class="flex space-x-2 p-2">
      <!-- Active Tab -->
      <button class="px-6 py-2 text-sm border border-gray-300 font-medium text-white bg-indigo-600 rounded-md">All</button>

      <!-- Inactive Tabs -->
      <button class="px-6 py-2 text-sm border border-gray-300 font-medium text-gray-600 hover:bg-gray-300 rounded-md">Open</button>

      <button class="px-6 py-2 text-sm border border-gray-300 font-medium text-gray-600 hover:bg-gray-300 rounded-md">Closed</button>

    </div>
  </div>


  <script src="./app_function/machine.js"></script>


</body>

</html>
